service: swiftrace
frameworkVersion: "4"
plugins:
  - serverless-dotenv-plugin
provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-1
  environment:
    LOGISTICS_DYNAMO_TABLE: swiftrace-logistics-dev
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:UpdateItem
          Resource:
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.LOGISTICS_DYNAMO_TABLE}
            - arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/${self:provider.environment.LOGISTICS_DYNAMO_TABLE}/index/*


functions:
  registerUser:
    handler: src/functions/user/registerUser.registerUser
    timeout: 29
    events:
      - http:
          path: /user
          method: post
          cors: true